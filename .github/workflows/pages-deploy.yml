name: Build and Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Jekyll and plugins
        run: |
          gem install jekyll jekyll-feed

      - name: Build Jekyll site
        run: |
          jekyll build --destination _site

      - name: Show `_site` build output (debug)
        run: |
          echo "_site size:"; du -sh _site || true
          echo "_site top-level files:"; ls -la _site || true
          echo "_site sample files:"; find _site -maxdepth 2 -type f | head -n 50 || true

      - name: Deploy to GitHub Pages via gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
